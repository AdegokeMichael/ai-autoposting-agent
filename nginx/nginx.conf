# ─────────────────────────────────────────────────────────────
#  nginx/nginx.conf
#  Reverse proxy for MrBade AutoPoster on EC2
# ─────────────────────────────────────────────────────────────

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;
    gzip on;

    # Allow large video uploads (up to 2GB)
    client_max_body_size 2048M;

    # Upstream app
    upstream autoposter {
        server autoposter:8000;
    }

    server {
        listen 80;
        server_name _;    # Replace _ with your domain or EC2 IP if needed

        # Increase timeouts for long video uploads and processing
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout 60s;

        # Proxy all requests to the FastAPI app
        location / {
            proxy_pass         http://autoposter;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Disable buffering for streaming responses
            proxy_buffering    off;
        }

        # Serve clip videos directly via Nginx (faster than going through Python)
        location /clips/ {
            alias /var/www/clips/;
            add_header Accept-Ranges bytes;
            add_header Cache-Control "public, max-age=3600";
        }
    }

    # ── Optional HTTPS block ───────────────────────────────────────────────────
    # Uncomment and fill in once you have SSL certs (e.g. from certbot/Let's Encrypt)
    #
    # server {
    #     listen 443 ssl;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #
    #     client_max_body_size 2048M;
    #     proxy_read_timeout   600s;
    #
    #     location / {
    #         proxy_pass       http://autoposter;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto https;
    #     }
    # }
}
