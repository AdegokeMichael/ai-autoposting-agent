# ─────────────────────────────────────────────────────────────
#  docker-compose.yml — LOCAL DEVELOPMENT
#  Usage: docker compose up
# ─────────────────────────────────────────────────────────────

services:
  autoposter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-autoposting-agent
    restart: unless-stopped

    # Load environment from your .env file
    env_file:
      - .env

    ports:
      - "8000:8000"

    # Mount volumes so data persists across container restarts
    # and so you can access generated clips on your host machine
    volumes:
      - ./uploads:/app/uploads
      - ./output:/app/output
      - ./watch_inbox:/app/watch_inbox
      - ./watch_processed:/app/watch_processed
      # Mount whisper model cache so it doesn't re-download on every container start
      - whisper_cache:/home/appuser/.cache

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# Named volume for whisper model cache
volumes:
  whisper_cache:
